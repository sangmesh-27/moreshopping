 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More Shopping</title>
<style>
body{font-family:Arial;margin:0;background:#f2f2f2}
header{background:#ff6a00;color:white;padding:15px;text-align:center}
.logo{font-size:28px;font-weight:bold}
nav{display:flex;justify-content:center;background:#222;flex-wrap:wrap}
nav a{color:white;padding:12px 18px;text-decoration:none}
nav a:hover{background:#444}
.container{padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.product{background:white;padding:15px;border-radius:10px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,0.2)}
.product img{width:100%;border-radius:10px}
button{background:#ff6a00;color:white;border:none;padding:10px 15px;border-radius:6px;cursor:pointer}
button:hover{background:#e55c00}
.cart{position:fixed;top:10px;right:10px;background:white;padding:10px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.3);width:220px}
.cart h3{margin-top:0}
footer{background:#111;color:white;text-align:center;padding:10px;margin-top:30px}
form{background:white;padding:15px;border-radius:10px;max-width:400px;margin:30px auto;box-shadow:0 2px 6px rgba(0,0,0,0.2)}
input,textarea{width:100%;padding:8px;margin:6px 0;border:1px solid #ccc;border-radius:5px}
</style>
</head>
<body>

<header>
<div class="logo">🛒 More Shopping</div>
<p>Order Our Products From Home</p>
</header>

<nav>
<a href="#products">Products</a>
<a href="#order">Order</a>
</nav>

<div class="cart">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<p>Total: ₹<span id="total">0</span></p>
<button onclick="checkout()">Pay / Order</button>
</div>

<section id="products" class="container">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Cake</h3>
<p>₹200</p>
<button onclick="addToCart('Cake',200)">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Coffee</h3>
<p>₹80</p>
<button onclick="addToCart('Coffee',80)">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Juice</h3>
<p>₹60</p>
<button onclick="addToCart('Juice',60)">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Snacks</h3>
<p>₹50</p>
<button onclick="addToCart('Snacks',50)">Add to Cart</button>
</div>

</section>

<section id="order">
<form onsubmit="submitOrder(event)">
<h3>Customer Order Form</h3>
<input type="text" id="name" placeholder="Your Name" required>
<input type="text" id="phone" placeholder="Phone Number" required>
<textarea id="address" placeholder="Delivery Address" required></textarea>
<button type="submit">Place Order</button>
</form>
</section>

<footer>
<p>© 2026 More Shopping | Shop Owner Admin Panel Coming</p>
</footer>

<script>
let cart=[];
let total=0;

function addToCart(name,price){
cart.push({name,price});
total+=price;
updateCart();
}

function updateCart(){
let list=document.getElementById("cartItems");
list.innerHTML="";
cart.forEach(item=>{
let li=document.createElement("li");
li.textContent=item.name+" - ₹"+item.price;
list.appendChild(li);
});
document.getElementById("total").textContent=total;
}

function checkout(){
alert("Customer will pay on delivery or online payment can be added later.");
}

function submitOrder(e){
e.preventDefault();
let name=document.getElementById("name").value;
alert("Thank you "+name+"! Your order has been received.");
}
</script>

</body>
</html>
